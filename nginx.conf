events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    image/svg+xml;

  # Security headers. Traefik/Dokploy handles TLS termination upstream.
  #
  # CSP notes:
  #   - script-src 'self' <SHA256 hashes>  — `'unsafe-inline'` is dropped.
  #     The `__CSP_SCRIPT_HASHES__` placeholder is sed-substituted by the
  #     Dockerfile build stage with the live sha256-base64 hashes of every
  #     inline <script>…</script> body across the prerendered output. Includes
  #     our app.html theme-flash + SvelteKit's __sveltekit_… base-injection
  #     snippets (which vary by route shape). Refresh is automatic per build.
  #   - style-src 'unsafe-inline'  — SvelteKit + Tailwind emit a small inline style
  #     tag for critical theme tokens.
  #   - connect-src 'self' https: data: blob:  — BYOK multi-provider architecture:
  #     users configure provider hosts (OpenRouter, Anthropic, Groq, Together,
  #     Fireworks, DeepInfra, Cerebras, SambaNova, self-deployed CORS proxies,
  #     and arbitrary openai-compatible endpoints) at runtime. We cannot enumerate
  #     them ahead of time, so connect-src permits any HTTPS destination and
  #     data:/blob: for in-browser assembled requests.
  #   - report-uri /api/csp-report  — violations forward to the Supabase Edge
  #     Function `csp-report` for telemetry. The endpoint accepts standard CSP
  #     report bodies (Content-Type: application/csp-report or application/json).
  #
  # HSTS (Strict-Transport-Security):
  #   Currently shipped at max-age=300 (5 minutes) for safe early observation.
  #   Browsers cache this header — once a long max-age is served, you cannot
  #   serve over HTTP for that duration. After verifying nothing breaks,
  #   ramp to `max-age=63072000; includeSubDomains; preload` and submit to
  #   the Chrome HSTS preload list.
  #
  # CSP additions for optional Google AdSense (only activate when the AdSense script actually loads, post-consent):
  #   - script-src:  pagead2.googlesyndication.com, googleads.g.doubleclick.net, www.googletagservices.com
  #   - frame-src:   googleads.g.doubleclick.net, tpc.googlesyndication.com
  # CSP additions for optional Google Analytics 4 (only loads post-consent + when PUBLIC_GA_ID is set):
  #   - script-src:  www.googletagmanager.com
  #   - connect-src: already permits all https: (covers www.google-analytics.com, region1.google-analytics.com)
  # These additions are harmless when each service is disabled (no script ever runs from those origins).
  add_header X-Frame-Options              "SAMEORIGIN" always;
  add_header X-Content-Type-Options       "nosniff" always;
  add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy           "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
  add_header Strict-Transport-Security    "max-age=300; includeSubDomains" always;
  add_header Content-Security-Policy      "default-src 'self'; script-src 'self' __CSP_SCRIPT_HASHES__ https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://www.googletagservices.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' https: data: blob:; frame-src 'self' https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; report-uri /api/csp-report;" always;

  server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SvelteKit emits one HTML file per route under its folder (e.g. /transforms/index.html).
    # try_files handles both clean URLs and the SPA fallback.
    location / {
      try_files $uri $uri/ $uri.html /index.html;
    }

    # Immutable hashed assets — long-lived cache.
    location ~* ^/_app/immutable/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Short-lived cache for everything else static.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
      expires 7d;
      add_header Cache-Control "public";
    }

    location = /health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # CSP violation reports land here. Default behavior is a 204 stub —
    # browsers stop logging "report-uri 404" errors but reports go nowhere.
    # To collect telemetry, deploy `supabase/functions/csp-report` and flip
    # the CSP `report-uri` value (in this same nginx.conf) to its absolute
    # URL: `https://<project-ref>.supabase.co/functions/v1/csp-report`.
    # Function spec lives next to the SQL migration that creates the
    # `csp_violations` table.
    location = /api/csp-report {
      access_log off;
      add_header Content-Type text/plain;
      return 204;
    }

    location ~ /\. {
      deny all;
    }
  }
}
