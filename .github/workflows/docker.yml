name: Docker build

# Multi-arch publish to ghcr.io/m4xx101/cryptex-oss without depending on any
# docker/* GitHub Actions. Background: codeload.github.com regularly returns
# 500s for docker/setup-qemu-action, docker/setup-buildx-action, and friends.
# Those archive downloads happen in the runner's "Prepare all required
# actions" phase before any step runs, so step-level continue-on-error
# cannot tolerate the failure. The whole workflow aborts in ~9 seconds.
#
# Fix: only use actions/checkout (different CDN, far more stable) and
# everything else via the Docker CLI that ships pre-installed on
# ubuntu-latest. buildx, login, push, metadata, all native commands.
#
# Strategy:
#   - linux/amd64 publishes unconditionally (binfmt not required).
#   - linux/arm64 publishes when binfmt installs cleanly (best-effort).
#   - On binfmt install failure, the workflow still publishes amd64 with a
#     ::warning:: annotation; arm64 catches up on the next push.

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
    paths:
      - 'Dockerfile'
      - 'nginx.conf'
      - 'docker-compose.yml'
      - '.dockerignore'
      - 'app/**'
      - 'src/transformers/**'
      - '.github/workflows/docker.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'nginx.conf'
      - 'app/**'
      - 'src/transformers/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # `contents: write` is required by the softprops/action-gh-release@v2
      # step on tag pushes (which calls POST /repos/.../releases). Without
      # it the build step succeeds but the Release-create step 403s.
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU emulators (binfmt) for arm64
        id: qemu
        continue-on-error: true
        run: |
          docker run --privileged --rm tonistiigi/binfmt:latest --install arm64
          echo "binfmt arm64 handlers installed"

      - name: Resolve build platforms
        id: platforms
        run: |
          if [ "${{ steps.qemu.outcome }}" = "success" ]; then
            echo "value=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "QEMU ready - building multi-arch (amd64 + arm64)."
          else
            echo "value=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "::warning::QEMU setup failed; publishing linux/amd64 only. arm64 will catch up on the next run."
          fi

      - name: Set up Docker Buildx (CLI)
        run: |
          # docker buildx ships native with Docker 23+ on ubuntu-latest.
          # We just need a container-driver builder for multi-arch.
          docker buildx create --use --name cryptex-builder --driver docker-container
          docker buildx inspect --bootstrap
          docker buildx version

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Resolve image tags
        id: tags
        run: |
          IMG="ghcr.io/m4xx101/cryptex-oss"
          SHA_SHORT="${GITHUB_SHA:0:7}"
          # Bash array of full image:tag strings.
          declare -a TAGS

          if [[ "$GITHUB_REF" == refs/tags/v*.*.* ]]; then
            # Tag push: e.g. refs/tags/v2.1.2
            # Emit BOTH "v"-prefixed and non-prefixed forms so :v2.1.2 and
            # :2.1.2 are both pullable. v2.1.0 and earlier used the no-v
            # convention via metadata-action default; we keep that working.
            VER="${GITHUB_REF#refs/tags/v}"
            MAJOR="${VER%%.*}"
            MINOR_NUM="${VER#*.}"; MINOR_NUM="${MINOR_NUM%%.*}"
            TAGS+=("${IMG}:v${VER}")          ; TAGS+=("${IMG}:${VER}")
            TAGS+=("${IMG}:v${MAJOR}.${MINOR_NUM}") ; TAGS+=("${IMG}:${MAJOR}.${MINOR_NUM}")
            TAGS+=("${IMG}:v${MAJOR}")        ; TAGS+=("${IMG}:${MAJOR}")
            TAGS+=("${IMG}:latest")
          elif [[ "$GITHUB_REF" == refs/heads/main || "$GITHUB_REF" == refs/heads/master ]]; then
            # Main pushes get :main + :sha-<short>; NEVER :latest. The :latest
            # tag should always equal the most recent semver tag, never the
            # bleeding-edge branch HEAD. Pre-v2.5.0 this also tagged :latest
            # here, which created a race where a docs-only push to main after
            # a release cut would overwrite :latest with main's older code.
            TAGS+=("${IMG}:main")
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            # Sanitize branch name (replace / with -)
            BRANCH="${BRANCH//\//-}"
            TAGS+=("${IMG}:${BRANCH}")
          fi
          TAGS+=("${IMG}:sha-${SHA_SHORT}")

          # Emit buildx --tag flags + a comma-separated list for logs.
          FLAGS=""
          LIST=""
          for t in "${TAGS[@]}"; do
            FLAGS+=" --tag $t"
            LIST+="${t},"
          done
          # GitHub output: use heredoc for multi-line safety
          {
            echo "flags<<EOF"
            echo "${FLAGS}"
            echo "EOF"
            echo "list=${LIST%,}"
          } >> "$GITHUB_OUTPUT"
          echo "Will tag: ${LIST%,}"

      - name: Build and (maybe) push image
        env:
          PLATFORMS: ${{ steps.platforms.outputs.value }}
          TAG_FLAGS: ${{ steps.tags.outputs.flags }}
        run: |
          PUSH_FLAG=""
          OUTPUT_FLAG=""
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            PUSH_FLAG="--push"
          else
            # PR builds: just verify the image builds, do not push.
            OUTPUT_FLAG="--output=type=image,push=false"
          fi

          # GitHub Actions cache backend for buildx layer cache.
          # This works through the gha-cache service, not codeload.
          docker buildx build \
            $PUSH_FLAG \
            $OUTPUT_FLAG \
            --platform "$PLATFORMS" \
            --cache-from "type=gha" \
            --cache-to "type=gha,mode=max" \
            $TAG_FLAGS \
            --file Dockerfile \
            --label "org.opencontainers.image.revision=$GITHUB_SHA" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            .

      - name: Build single-arch image for local smoke test
        run: |
          # Local-load amd64 image so the next step can `docker run` it.
          docker buildx build \
            --load \
            --platform linux/amd64 \
            --cache-from "type=gha" \
            --tag cryptex:ci \
            --file Dockerfile \
            .

      - name: Smoke-test the container
        run: |
          # Start, wait for health, probe the routes, stop.
          docker run -d --name cryptex-ci -p 8080:80 cryptex:ci
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              echo "Health check passed"
              break
            fi
            sleep 1
          done
          echo "--- routes ---"
          curl -s -o /dev/null -w "%{http_code}  /\n"             http://localhost:8080/
          curl -s -o /dev/null -w "%{http_code}  /campaign/\n"    http://localhost:8080/campaign/
          curl -s -o /dev/null -w "%{http_code}  /transforms/\n"  http://localhost:8080/transforms/
          curl -s -o /dev/null -w "%{http_code}  /decode/\n"      http://localhost:8080/decode/
          curl -s -o /dev/null -w "%{http_code}  /emoji/\n"       http://localhost:8080/emoji/
          curl -s -o /dev/null -w "%{http_code}  /settings/\n"    http://localhost:8080/settings/
          docker logs cryptex-ci | tail -20
          docker stop cryptex-ci && docker rm cryptex-ci

      - name: Extract CHANGELOG section for this release
        if: startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request'
        id: changelog
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          # Extract the [X.Y.Z] section: from `## [X.Y.Z]` until the next `## ` heading (exclusive).
          # Uses awk's `index()` (literal substring match) instead of a
          # dynamic regex to dodge shell/awk escape-sequence interpretation
          # of the brackets and version-string dots.
          awk -v ver="$VER" '
            index($0, "## [" ver "]") == 1 { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG entry for $VER; falling back to auto-generated notes." >&2
            echo "_See [CHANGELOG.md](https://github.com/m4xx101/cryptex-oss/blob/main/CHANGELOG.md) for full release notes._" > RELEASE_NOTES.md
          fi
          echo "Release notes preview:"
          head -40 RELEASE_NOTES.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish summary
        if: always()
        env:
          PLATFORMS: ${{ steps.platforms.outputs.value }}
          TAG_LIST: ${{ steps.tags.outputs.list }}
        run: |
          {
            echo "## Docker build summary"
            echo ""
            echo "- Platforms attempted: \`${PLATFORMS}\`"
            if [ "${{ steps.qemu.outcome }}" != "success" ]; then
              echo "- ⚠️  QEMU setup failed; arm64 was skipped this run."
            fi
            echo "- Tags pushed (skipped on PR): \`${TAG_LIST}\`"
            echo ""
            echo "Pull from a clean machine:"
            echo '```bash'
            echo 'docker run -d --name cryptex --restart unless-stopped \'
            echo '  -p 8080:80 ghcr.io/m4xx101/cryptex-oss:latest'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
