<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <!-- Brand-mark favicon. Hardcoded brand palette inside the SVG so it
         renders correctly in light + dark browser chrome. -->
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="mask-icon" href="%sveltekit.assets%/favicon.svg" color="#f97316" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#1a1410" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafaf8" media="(prefers-color-scheme: light)" />
    <title>Cryptex — Universal Text Lab</title>
    <meta name="description" content="162 transforms, ciphers, steganography, and decoders in one lab. Offline-capable, local-first." />
    <!-- OG / social-card meta. Image is optional — kept simple so unfurlers fall back to title+description gracefully. -->
    <meta property="og:title" content="Cryptex — Universal Text Lab" />
    <meta property="og:description" content="The AI red-teamer's text lab — local-first, BYOK, browser-only." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%sveltekit.assets%/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="%sveltekit.assets%/og-image.png" />
    <script>
      // Set theme class before paint to avoid flash
      (function () {
        try {
          var raw = localStorage.getItem('cryptex.theme') || localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var mode = 'system';
          if (raw) {
            try { var parsed = JSON.parse(raw); mode = parsed.mode || parsed || 'system'; }
            catch (e) { mode = raw; }
          }
          var resolved = mode === 'system' ? (prefersDark ? 'dark' : 'light') : mode;
          if (resolved === 'dark') document.documentElement.classList.add('dark');
        } catch (e) { /* ignore */ }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="h-full bg-background text-foreground font-sans antialiased">
    <div id="app" class="min-h-full">%sveltekit.body%</div>
  </body>
</html>
